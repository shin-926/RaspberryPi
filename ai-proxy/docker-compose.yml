services:
  ai-proxy:
    build: .
    container_name: ai-proxy
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HENRY_FIREBASE_API_KEY=${HENRY_FIREBASE_API_KEY}
      - HENRY_FIREBASE_REFRESH_TOKEN=${HENRY_FIREBASE_REFRESH_TOKEN}
      - HENRY_ORG_UUID=${HENRY_ORG_UUID}
